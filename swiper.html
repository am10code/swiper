<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ТаскСвайпер</title>
  <link rel="stylesheet" href="popup/popup.css">
  <style>
    html, body {
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      background: var(--bg-page);
      display: flex;
      flex-direction: column;
    }
    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
    }
    .swiper-section {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <button id="burgerMenuBtn" class="burger-menu-btn" title="Меню">☰</button>
      <h1>ТаскСвайпер</h1>
    </header>

    <!-- Бургер-меню -->
    <div id="burgerMenu" class="burger-menu" style="display: none;">
      <div class="burger-menu-overlay"></div>
      <div class="burger-menu-content">
        <button class="burger-menu-item" data-section="main">
          <span>📋</span>
          <span>Задачи</span>
        </button>
        <button class="burger-menu-item" data-section="search">
          <span>🔍</span>
          <span>Поиск</span>
        </button>
        <button class="burger-menu-item" data-section="completed">
          <span>✅</span>
          <span>Выполненные задачи</span>
        </button>
        <button class="burger-menu-item active" data-section="swiper">
          <span>💫</span>
          <span>ТаскСвайпер</span>
        </button>
        <button class="burger-menu-item" data-section="frequently-postponed">
          <span>⏰</span>
          <span>Часто откладываемые</span>
        </button>
      </div>
    </div>

    <!-- Раздел ТаскСвайпер -->
    <div class="swiper-section" id="swiperSection">
      <div class="swiper-header">
        <div class="swiper-progress">
          <div id="swiperCounter" class="progress-counter">0 / 0</div>
        </div>
      </div>
      <div class="swiper-container">
        <div id="swiperCardContainer" class="swiper-card-container">
          <div class="swiper-side-action left">
            <button id="postponeBtn" class="swiper-action-btn swiper-side-btn postpone-btn" title="Отложить">
              <span>←</span>
            </button>
            <div class="swiper-side-label">Позже</div>
          </div>
          <!-- Карточки будут добавлены динамически -->
          <div class="swiper-side-action right">
            <button id="scheduleBtn" class="swiper-action-btn swiper-side-btn schedule-btn" title="Запланировать на сегодня">
              <span>→</span>
            </button>
            <div class="swiper-side-label">На сегодня</div>
          </div>
        </div>
        <div class="swiper-controls">
          <div class="swiper-hint" id="swiperHint" style="display: none;">
            ← Позже, → На сегодня
          </div>
          <div id="swiperEmptyState" class="empty-state" style="display: none;">
            <h3>Все задачи обработаны</h3>
            <p>Вы разобрали очередь задач. Можно вернуться к списку.</p>
            <button type="button" id="swiperBackToTasksBtn" class="btn-primary">Вернуться к списку задач</button>
          </div>
        </div>
      </div>
      <div class="swiper-footer">
        <div class="swiper-actions secondary-actions">
          <button id="undoBtn" class="swiper-action-btn undo-btn" title="Отменить">
            <span>↶</span>
          </button>
          <button id="editSwiperBtn" class="swiper-action-btn edit-btn" title="Редактировать">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 297.068 297.068" width="20" height="20">
              <path style="fill:currentColor;" d="M288.758,46.999l-38.69-38.69c-5.347-5.354-12.455-8.303-20.02-8.303s-14.672,2.943-20.02,8.297L28.632,190.266L0,297.061l107.547-28.805L288.745,87.045c5.36-5.354,8.323-12.462,8.323-20.026S294.105,52.347,288.758,46.999z M43.478,193.583L180.71,55.823l60.554,60.541L103.761,253.866L43.478,193.583z M37.719,206.006l53.368,53.362l-42.404,11.35L26.35,248.384L37.719,206.006z M279.657,77.951l-19.493,19.505l-60.579-60.541l19.544-19.525c5.823-5.848,16.016-5.842,21.851,0l38.69,38.696c2.924,2.918,4.544,6.8,4.544,10.926C284.214,71.139,282.594,75.027,279.657,77.951z"/>
            </svg>
          </button>
          <button id="deleteSwiperBtn" class="swiper-action-btn delete-btn" title="Удалить">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="20" height="20">
              <g transform="translate(232, 228)">
                <polygon style="fill:currentColor;" points="-207.5,-205.1 -204.5,-205.1 -204.5,-181.1 -207.5,-181.1"/>
                <polygon style="fill:currentColor;" points="-201.5,-205.1 -198.5,-205.1 -198.5,-181.1 -201.5,-181.1"/>
                <polygon style="fill:currentColor;" points="-195.5,-205.1 -192.5,-205.1 -192.5,-181.1 -195.5,-181.1"/>
                <polygon style="fill:currentColor;" points="-219.5,-214.1 -180.5,-214.1 -180.5,-211.1 -219.5,-211.1"/>
                <path style="fill:currentColor;" d="M-192.6-212.6h-2.8v-3c0-0.9-0.7-1.6-1.6-1.6h-6c-0.9,0-1.6,0.7-1.6,1.6v3h-2.8v-3c0-2.4,2-4.4,4.4-4.4h6c2.4,0,4.4,2,4.4,4.4V-212.6"/>
                <path style="fill:currentColor;" d="M-191-172.1h-18c-2.4,0-4.5-2-4.7-4.4l-2.8-36l3-0.2l2.8,36c0.1,0.9,0.9,1.6,1.7,1.6h18c0.9,0,1.7-0.8,1.7-1.6l2.8-36l3,0.2l-2.8,36C-186.5-174-188.6-172.1-191-172.1"/>
              </g>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Подтверждение удаления задачи (ТаскСвайпер) -->
    <div id="swiperDeleteModal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Удаление задачи</h2>
        <p id="swiperDeleteMessage"></p>
        <div class="modal-actions">
          <button type="button" id="swiperDeleteCancelBtn" class="btn-secondary">Отмена</button>
          <button type="button" id="swiperDeleteConfirmBtn" class="btn-danger">Удалить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup/storage.js"></script>
  <script src="popup/modules/swiper/swiper.js"></script>
  <script src="popup/modules/swiper/swiper-nav.js"></script>
  <script src="popup/modules/swiper/swiper-init.js"></script>
</body>
</html>
